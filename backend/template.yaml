AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: JGrants subsidy chatbot backend

Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - arm64
    Timeout: 20
    MemorySize: 512
    Environment:
      Variables:
        JGRANTS_BASE_URL: https://api.jgrants-portal.go.jp/exp
        DEFAULT_REGION: 全国
        ENABLE_LLM: "true"
        BEDROCK_MODEL_ID: anthropic.claude-3-haiku-20240307-v1:0

Resources:
  ChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Description: Uses Bedrock to collect subsidy intake details, then searches JGrants.
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - "*"
          AllowMethods:
            - POST
          AllowHeaders:
            - content-type
      Events:
        ChatApi:
          Type: HttpApi
          Properties:
            Path: /chat
            Method: POST
            ApiId: !Ref ChatHttpApi

  ChatHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - content-type

Outputs:
  ChatApiUrl:
    Description: API Gateway endpoint for the chatbot backend.
    Value: !Sub "https://${ChatHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  ChatFunctionUrl:
    Description: Direct Lambda Function URL.
    Value: !GetAtt ChatFunctionUrl.FunctionUrl
